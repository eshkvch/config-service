name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/actions/docker-setup/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/actions/docker-setup/**'
      - '.github/workflows/ci.yml'

jobs:
  backend_lint:
    name: Backend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: go mod download
        working-directory: ./backend

      - name: Check formatting
        run: test -z "$(gofmt -l .)"
        working-directory: ./backend

      - run: go vet ./...
        working-directory: ./backend

  backend_test:
    name: Backend Test
    runs-on: ubuntu-latest
    needs: backend_lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: go mod download
        working-directory: ./backend

      - run: go test -v ./...
        working-directory: ./backend
        
  sonar_backend:
    name: SonarQube Backend Analysis
    runs-on: ubuntu-latest
    needs: backend_test
    environment: Base

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        working-directory: ./backend
        run: go mod download

      - name: Run tests with coverage
        working-directory: ./backend
        run: go test -coverpkg=./... ./... -coverprofile=coverage.out

      - name: SonarQube Scan (Backend)
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
        with:
          args: >
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.projectKey=devops-lab
            -Dsonar.projectName=devops-lab
            -Dsonar.sources=cmd,config,internal,pkg
            -Dsonar.exclusions=**/*_test.go,internal/handler/doc.*,internal/infrastructure/database/queries/**
            -Dsonar.coverage.exclusions=**/*_test.go,cmd/**,internal/di/**,pkg/server/**
            -Dsonar.cpd.exclusions=**/*_test.go
            -Dsonar.projectBaseDir=backend
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
            -Dsonar.working.directory=.scannerwork

  backend_build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: sonar_backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: go mod download
        working-directory: ./backend

      - run: go build -v ./...
        working-directory: ./backend

  frontend_lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    needs: backend_build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
        working-directory: ./frontend

      - run: npm run lint
        working-directory: ./frontend

  frontend_test:
    name: Frontend Test
    runs-on: ubuntu-latest
    needs: frontend_lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
        working-directory: ./frontend

      - run: npm test
        working-directory: ./frontend


  sonar_frontend:
    name: SonarQube Frontend Analysis
    runs-on: ubuntu-latest
    needs: frontend_test
    environment: Base

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: ./frontend
        run: npm test -- --coverage

      - name: SonarQube Scan (Frontend)
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONTEND }}
        with:
          args: >
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.projectKey=devops-lab-frontend
            -Dsonar.projectName=devops-lab-frontend
            -Dsonar.sources=src
            -Dsonar.projectBaseDir=frontend
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
            -Dsonar.working.directory=.scannerwork

  frontend_build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: sonar_frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
        working-directory: ./frontend

      - run: npm run build
        working-directory: ./frontend

  publish_backend:
    name: Publish Backend Image
    runs-on: ubuntu-latest
    needs: backend_build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/docker-setup
        with:
          service: backend

  publish_frontend:
    name: Publish Frontend Image
    runs-on: ubuntu-latest
    needs: frontend_build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/docker-setup
        with:
          service: frontend

  notify:
    uses: ./.github/workflows/notify.yml
    needs:
      - backend_lint
      - backend_test
      - sonar_backend
      - backend_build
      - frontend_lint
      - frontend_test
      - sonar_frontend
      - frontend_build
      - publish_backend
      - publish_frontend

    with:
      backend_lint: ${{ needs.backend_lint.result }}
      backend_test: ${{ needs.backend_test.result }}
      sonar_backend: ${{ needs.sonar_backend.result }}
      backend_build: ${{ needs.backend_build.result }}

      frontend_lint: ${{ needs.frontend_lint.result }}
      frontend_test: ${{ needs.frontend_test.result }}
      sonar_frontend: ${{ needs.sonar_frontend.result }}
      frontend_build: ${{ needs.frontend_build.result }}

      publish_backend: ${{ needs.publish_backend.result }}
      publish_frontend: ${{ needs.publish_frontend.result }}

    secrets:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}}