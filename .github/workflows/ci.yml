name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/actions/docker-setup/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/actions/docker-setup/**'
      - '.github/workflows/ci.yml'

jobs:
  backend_lint:
    name: Backend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: go mod download
        working-directory: ./backend

      - name: Check formatting
        run: test -z "$(gofmt -l .)"
        working-directory: ./backend

      - run: go vet ./...
        working-directory: ./backend

  backend_test:
    name: Backend Test
    runs-on: ubuntu-latest
    needs: backend_lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: go mod download
        working-directory: ./backend

      - run: go test -v ./...
        working-directory: ./backend
        
  sonar_backend:
    name: SonarQube Backend Analysis
    runs-on: ubuntu-latest
    needs: backend_test
    environment: Base

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        working-directory: ./backend
        run: go mod download

      - name: Run tests with coverage
        working-directory: ./backend
        run: go test -coverpkg=./... ./... -coverprofile=coverage.out

      - name: SonarQube Scan (Backend)
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
        with:
          args: >
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.projectKey=devops-lab
            -Dsonar.projectName=devops-lab
            -Dsonar.sources=cmd,config,internal,pkg
            -Dsonar.exclusions=**/*_test.go,internal/handler/doc.*,internal/infrastructure/database/queries/**
            -Dsonar.coverage.exclusions=**/*_test.go,cmd/**,internal/di/**,pkg/server/**
            -Dsonar.cpd.exclusions=**/*_test.go
            -Dsonar.projectBaseDir=backend
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
            -Dsonar.working.directory=.scannerwork

  backend_build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: sonar_backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: go mod download
        working-directory: ./backend

      - run: go build -v ./...
        working-directory: ./backend

  frontend_lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    needs: backend_build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
        working-directory: ./frontend

      - run: npm run lint
        working-directory: ./frontend

  frontend_test:
    name: Frontend Test
    runs-on: ubuntu-latest
    needs: frontend_lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
        working-directory: ./frontend

      - run: npm test
        working-directory: ./frontend


  sonar_frontend:
    name: SonarQube Frontend Analysis
    runs-on: ubuntu-latest
    needs: frontend_test
    environment: Base

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: ./frontend
        run: npm test -- --coverage

      - name: SonarQube Scan (Frontend)
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONTEND }}
        with:
          args: >
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.projectKey=devops-lab-frontend
            -Dsonar.projectName=devops-lab-frontend
            -Dsonar.sources=src
            -Dsonar.projectBaseDir=frontend
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
            -Dsonar.working.directory=.scannerwork

  frontend_build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: sonar_frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
        working-directory: ./frontend

      - run: npm run build
        working-directory: ./frontend

  publish_backend:
    name: Publish Backend Image
    runs-on: ubuntu-latest
    needs: backend_build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/docker-setup
        with:
          service: backend

  publish_frontend:
    name: Publish Frontend Image
    runs-on: ubuntu-latest
    needs: frontend_build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/docker-setup
        with:
          service: frontend

  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs:
      - backend_lint
      - backend_test
      - sonar_backend
      - backend_build
      - frontend_lint
      - frontend_test
      - sonar_frontend
      - frontend_build
      - publish_backend
      - publish_frontend
    if: always() && !cancelled()
    environment: Base

    steps:
      - name: Send pipeline status to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
          EVENT: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          BACKEND_LINT: ${{ needs.backend_lint.result }}
          BACKEND_TEST: ${{ needs.backend_test.result }}
          SONAR_BACKEND: ${{ needs.sonar_backend.result }}
          BACKEND_BUILD: ${{ needs.backend_build.result }}
          FRONTEND_LINT: ${{ needs.frontend_lint.result }}
          FRONTEND_TEST: ${{ needs.frontend_test.result }}
          SONAR_FRONTEND: ${{ needs.sonar_frontend.result }}
          FRONTEND_BUILD: ${{ needs.frontend_build.result }}
          PUBLISH_BACKEND: ${{ needs.publish_backend.result }}
          PUBLISH_FRONTEND: ${{ needs.publish_frontend.result }}
        run: |
          set -euo pipefail

          status_icon() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              skipped)   echo "⏭️" ;;
              cancelled) echo "🚫" ;;
              *)         echo "❔" ;;
            esac
          }

          job_line() {
            local name="$1"
            local result="$2"
            printf '%s <b>%s</b> — %s' "$(status_icon "$result")" "$name" "$result"
          }

          FAILED=0
          for result in \
            "$BACKEND_LINT" "$BACKEND_TEST" "$SONAR_BACKEND" "$BACKEND_BUILD" \
            "$FRONTEND_LINT" "$FRONTEND_TEST" "$SONAR_FRONTEND" "$FRONTEND_BUILD" \
            "$PUBLISH_BACKEND" "$PUBLISH_FRONTEND"
          do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            HEADER="❌ <b>CI Pipeline: FAILED</b>"
            FOOTER="⚠️ <b>At least one job failed.</b>"
          else
            HEADER="✅ <b>CI Pipeline: SUCCESS</b>"
            FOOTER="🎉 <b>All jobs completed successfully.</b>"
          fi

          SHORT_SHA="${SHA:0:7}"
          COMMIT_URL="${{ github.server_url }}/${REPO}/commit/${SHA}"

          MESSAGE="${HEADER}

          📦 <b>Repository:</b> <code>${REPO}</code>
          🌿 <b>Branch:</b> <code>${BRANCH}</code>
          🔀 <b>Event:</b> ${EVENT}
          👤 <b>Triggered by:</b> ${ACTOR}
          🔗 <b>Commit:</b> <a href=\"${COMMIT_URL}\">${SHORT_SHA}</a>

          ━━━━━━━━━━━━━━━━━━
          <b>Backend</b>
          $(job_line "Lint" "$BACKEND_LINT")
          $(job_line "Test" "$BACKEND_TEST")
          $(job_line "SonarQube" "$SONAR_BACKEND")
          $(job_line "Build" "$BACKEND_BUILD")

          <b>Frontend</b>
          $(job_line "Lint" "$FRONTEND_LINT")
          $(job_line "Test" "$FRONTEND_TEST")
          $(job_line "SonarQube" "$SONAR_FRONTEND")
          $(job_line "Build" "$FRONTEND_BUILD")

          <b>Publish</b>
          $(job_line "Backend image" "$PUBLISH_BACKEND")
          $(job_line "Frontend image" "$PUBLISH_FRONTEND")
          ━━━━━━━━━━━━━━━━━━

          ${FOOTER}

          <a href=\"${RUN_URL}\">Open workflow run</a>"

          jq -n \
            --arg chat_id "$TG_CHAT_ID" \
            --arg text "$MESSAGE" \
            '{
              chat_id: $chat_id,
              text: $text,
              parse_mode: "HTML",
              disable_web_page_preview: true
            }' \
            | curl --fail --silent --show-error \
                --request POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
                --header "Content-Type: application/json" \
                --data @-