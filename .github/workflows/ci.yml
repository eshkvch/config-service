name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'

jobs:
  backend_lint:
    name: Backend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: go mod download
        working-directory: ./backend

      - run: go fmt ./...
        working-directory: ./backend

      - run: go vet ./...
        working-directory: ./backend

  backend_test:
    name: Backend Test
    runs-on: ubuntu-latest
    needs: backend_lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: go mod download
        working-directory: ./backend

      - run: go test -v ./...
        working-directory: ./backend

  backend_build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: backend_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: go mod download
        working-directory: ./backend

      - run: go build -v ./...
        working-directory: ./backend

  frontend_lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    needs: backend_build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install
        working-directory: ./frontend

      - run: npm run lint
        working-directory: ./frontend

  frontend_test:
    name: Frontend Test
    runs-on: ubuntu-latest
    needs: frontend_lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install
        working-directory: ./frontend

      - run: npm test
        working-directory: ./frontend

  frontend_build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install
        working-directory: ./frontend

      - run: npm run build
        working-directory: ./frontend