name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/actions/docker-setup/**"
      - ".github/workflows/ci-cd.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/actions/docker-setup/**"
      - ".github/workflows/ci-cd.yml"

jobs:
  backend_lint:
    name: Backend lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        working-directory: ./backend
        run: go mod download

      - name: Check formatting
        working-directory: ./backend
        run: test -z "$(gofmt -l .)"

      - name: Run go vet
        working-directory: ./backend
        run: go vet ./...

  backend_test:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: backend_lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        working-directory: ./backend
        run: go mod download

      - name: Run unit tests
        working-directory: ./backend
        run: go test -v ./...

  frontend_lint:
    name: Frontend lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint

  frontend_test:
    name: Frontend tests
    runs-on: ubuntu-latest
    needs: frontend_lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test

  publish_backend:
    name: Publish backend image to GHCR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - backend_test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push backend image
        uses: ./.github/actions/docker-setup
        with:
          service: backend

  publish_frontend:
    name: Publish frontend image to GHCR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - frontend_test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push frontend image
        uses: ./.github/actions/docker-setup
        with:
          service: frontend

